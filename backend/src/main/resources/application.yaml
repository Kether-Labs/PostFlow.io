spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Postflow.io

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # flyway config
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # redis config
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT}
      timeout: 2000ms          # timeout connexion — évite de bloquer si Redis est down
      lettuce:
        pool:
          max-active: 8        # connexions actives max
          max-idle: 4          # connexions inactives max
          min-idle: 1          # connexions inactives min (warm pool)
          max-wait: 1000ms
  spring:
    mail:
      host: ${SMTP_HOST}
      port: ${SMTP_PORT}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true    # chiffrement TLS obligatoire
app:
  base-url: ${APP_BASE_URL}
  mail:
    from: ${MAIL_FROM}
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}