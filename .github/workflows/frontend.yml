name: Frontend CI/CD

# Force Node.js 24 pour éviter le warning de dépréciation
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  # Job 1: Linting et Formatage
  lint-and-format:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: pnpm lint

      - name: Check code formatting (Prettier)
        working-directory: frontend
        run: |
          if grep -q '"format:check"' package.json; then
            pnpm format:check
          else
            echo "No format:check script found, skipping..."
          fi

  # Job 2: Build
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: frontend
        run: pnpm db:generate

      - name: Build application
        working-directory: frontend
        run: pnpm build

  # Job 3: Auto-format (sur main uniquement)
  auto-format:
    name: ✨ Auto Format Code
    runs-on: ubuntu-latest
    needs: [lint-and-format, build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Format code with Prettier
        working-directory: frontend
        run: |
          if grep -q '"format"' package.json; then
            pnpm format
          else
            echo "No format script found, skipping..."
          fi

      - name: Commit formatted code
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "style: auto-format code [skip ci]"
          git push

  # Job 4: Tests (décommentez quand vous aurez des tests)
